<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white text-center"><h5 class="mb-0">Register</h5></div>
                <div class="card-body">
                    <div id="error-msg" class="alert alert-danger d-none"></div>
                    <form id="register-form">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required minlength="3" maxlength="50" autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-success w-100">Create Account</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">Have an account? <a href="/login">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    });
    if (res.ok) {
        const data = await res.json();
        localStorage.setItem('jwt', data.token);
        localStorage.setItem('username', data.username);
        localStorage.setItem('role', data.role);
        window.location.href = '/';
    } else {
        const err = await res.json();
        const el = document.getElementById('error-msg');
        el.textContent = err.error || 'Registration failed';
        el.classList.remove('d-none');
    }
});
</script>
</body>
</html>
