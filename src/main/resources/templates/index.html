<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Upload Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-primary px-3">
    <span class="navbar-brand fw-semibold">File Upload Demo</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nav-username"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container mt-4" style="max-width:900px">
    <!-- Upload -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header fw-semibold">Upload File</div>
        <div class="card-body">
            <div id="upload-msg" class="alert d-none"></div>
            <form id="upload-form" class="d-flex gap-2">
                <input type="file" class="form-control" id="file-input" required>
                <button type="submit" class="btn btn-primary text-nowrap">Upload</button>
            </form>
            <div id="upload-progress" class="d-none mt-2">
                <div class="progress">
                    <div id="upload-progress-bar"
                         class="progress-bar progress-bar-striped progress-bar-animated"
                         role="progressbar" style="width: 0%"
                         aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                </div>
                <small id="upload-progress-text" class="text-muted mt-1 d-block"></small>
            </div>
        </div>
    </div>

    <!-- File list -->
    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center fw-semibold">
            My Files
            <button class="btn btn-sm btn-outline-secondary" onclick="loadFiles()">Refresh</button>
        </div>
        <div class="card-body p-0">
            <div id="empty-msg" class="text-center text-muted py-5 d-none">No files yet.</div>
            <table class="table table-hover mb-0" id="file-table" style="display:none">
                <thead class="table-light">
                    <tr>
                        <th>Filename</th><th>Type</th><th>Size</th><th>Scan</th><th>Uploaded</th><th></th>
                    </tr>
                </thead>
                <tbody id="file-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
