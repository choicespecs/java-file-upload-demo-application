server.port=8080

# H2 (dev)
spring.datasource.url=jdbc:h2:mem:fileuploaddb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# App
app.jwt-secret=change-this-to-a-long-random-secret-in-production-environments
app.jwt-expiration-ms=86400000
app.upload-dir=./uploads
app.max-file-size-mb=10
app.max-login-attempts=5
app.chunk-size-mb=5
app.max-large-file-size-mb=2048
